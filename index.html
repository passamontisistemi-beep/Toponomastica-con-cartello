<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nuova Toponomastica Aumentata</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:Arial,sans-serif;
  background:#0b1220;
}
#map{
  width:100%;
  height:100%;
}
.panel{
  position:absolute;
  top:20px;
  left:20px;
  z-index:1000;
  width:360px;
  max-width:calc(100% - 40px);
  background:rgba(255,255,255,.96);
  padding:18px;
  border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,.25);
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#eef4ff;
  color:#0a66ff;
  font-size:12px;
  margin-bottom:8px;
}
h1{
  margin:0 0 10px;
  font-size:24px;
  color:#111;
}
.small{
  font-size:14px;
  color:#444;
  line-height:1.45;
}
.btn{
  width:100%;
  margin-top:12px;
  border:none;
  background:#0a66ff;
  color:#fff;
  padding:12px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="panel">
  <div class="badge">Toponomastica Aumentata</div>
  <h1 id="streetTitle">Via della Città</h1>
  <div class="small">
    Hai scansionato il QR della via.<br><br>
    Autorizzami il rilievo della tua posizione per mostrarti la mappa e i punti di interesse vicini.
  </div>
  <button class="btn" onclick="startApp()">Autorizza posizione</button>
  <div id="status" class="small" style="margin-top:10px;"></div>
</div>

<div id="map"></div>

<script>
let map;
let userPos = [39.2238, 9.1217]; // fallback Cagliari

const params = new URLSearchParams(window.location.search);
const street = params.get("street") || "Via della Città";
document.getElementById("streetTitle").innerText = street;

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

function startApp(){
  if(!navigator.geolocation){
    setStatus("Geolocalizzazione non disponibile.");
    initMap();
    loadPOI();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos){
      userPos = [pos.coords.latitude, pos.coords.longitude];
      initMap();
      loadPOI();
    },
    function(){
      setStatus("Permesso negato. Uso posizione demo.");
      initMap();
      loadPOI();
    }
  );
}

function initMap(){
  map = L.map("map").setView(userPos, 16);

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {maxZoom:20}
  ).addTo(map);

  L.marker(userPos)
    .addTo(map)
    .bindPopup("<b>Tu sei qui</b>")
    .openPopup();

  setStatus("Mappa caricata.");
}

async function loadPOI(){
  try{
    const url =
      "https://it.wikipedia.org/w/api.php?action=query&list=geosearch" +
      "&gscoord=" + userPos[0] + "|" + userPos[1] +
      "&gsradius=3000&gslimit=20&format=json&origin=*";

    const res = await fetch(url);
    const data = await res.json();

    data.query.geosearch.forEach(poi => {
      const poiPos = [poi.lat, poi.lon];

      const distance = Math.round(
        map.distance(userPos, poiPos)
      );

      const walk = Math.max(1, Math.round(distance / 80));

      const lines = ["1","5","6","7","8","M","PF","QS"];
      const l1 = lines[Math.floor(Math.random()*lines.length)];
      const l2 = lines[Math.floor(Math.random()*lines.length)];
      const ctm = l1 === l2 ? l1 : l1 + ", " + l2;

      L.marker(poiPos)
        .addTo(map)
        .bindPopup(
          "<b>" + poi.title + "</b><br>" +
          "🚌 CTM: " + ctm + "<br>" +
          "🚶 " + walk + " min a piedi<br><br>" +
          "<button onclick=\"openWiki('" + encodeURIComponent(poi.title) + "')\">Apri Wikipedia</button>"
        );
    });

    setStatus("Punti di interesse caricati.");
  }catch(e){
    setStatus("Errore caricamento punti di interesse.");
  }
}

function openWiki(title){
  window.open(
    "https://it.wikipedia.org/wiki/" + title,
    "_blank"
  );
}
</script>

</body>
</html>
