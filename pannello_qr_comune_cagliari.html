<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pannello QR Comune di Cagliari</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body{margin:0;background:#eef3f8;font-family:Arial,sans-serif;display:grid;place-items:center;min-height:100vh}.panel{width:420px;background:#fff;border:8px solid #123a63;border-radius:24px;padding:28px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.2)}.logo{width:90px;height:90px;border-radius:50%;margin:0 auto 14px;background:linear-gradient(135deg,#123a63,#1e73be);color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px}.title1{font-size:14px;color:#123a63;letter-spacing:1px}.street{font-size:34px;font-weight:800;margin:12px 0;color:#111}.qrbox{display:grid;place-items:center;padding:18px;background:#f8fafc;border-radius:18px}.note{margin-top:12px;color:#555;font-size:14px}.btn{margin-top:14px;padding:10px 14px;border:0;border-radius:12px;background:#123a63;color:#fff;cursor:pointer}
</style></head>
<body>
<div class='panel'>
<div class='logo'>COMUNE<br>CAGLIARI</div>
<div class='title1'>TOPONOMASTICA AUMENTATA</div>
<div class='street' id='streetLabel'>VIALE TRIESTE</div>
<div class='qrbox'><div id='qrcode'></div></div>
<div class='note'>Scansiona il codice QR per accedere alla web app e autorizzare la posizione.</div>
<button class='btn' onclick='downloadPanel()'>Scarica pannello</button>
</div>
<script>
const street='Viale Trieste';
const base=window.location.href.replace(/pannello_qr_comune_cagliari\.html.*/,'nuova_toponomastica_aumentata.html');
const url=base+'?street='+encodeURIComponent(street);
document.getElementById('streetLabel').innerText=street.toUpperCase();
new QRCode(document.getElementById('qrcode'),{text:url,width:220,height:220});
function downloadPanel(){window.print();}
</script>
</body></html>
