<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuova Toponomastica Aumentata - Cagliari</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
:root{--a:#0a66ff;--b:#00c2a8;--bg:#08111f}*{box-sizing:border-box}body,html{margin:0;height:100%;font-family:Inter,Arial,sans-serif;background:var(--bg);color:#fff}#map{height:100vh}.hero{position:absolute;inset:0 0 auto 0;z-index:1000;padding:18px;background:linear-gradient(180deg,rgba(8,17,31,.92),rgba(8,17,31,.35),transparent)}.card{max-width:520px;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);padding:18px;border-radius:24px;box-shadow:0 20px 40px rgba(0,0,0,.25)}h1{margin:0 0 8px;font-size:30px}.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.12);margin:4px 4px 8px 0;font-size:12px}.btn{border:0;padding:12px 16px;border-radius:14px;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-weight:700;cursor:pointer}.toolbar{position:absolute;right:16px;bottom:16px;z-index:1000;display:grid;gap:10px}.fab{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;background:#fff;color:#111;box-shadow:0 10px 24px rgba(0,0,0,.3)}.badge{position:absolute;left:16px;bottom:16px;z-index:1000;background:rgba(255,255,255,.12);padding:10px 14px;border-radius:14px;backdrop-filter:blur(8px)}
</style></head><body>
<div class='hero'><div class='card'>
<div class='pill'>Festa di Sant'Efisio</div><div class='pill'>America's Cup</div><div class='pill'>Smart City Cagliari</div>
<h1>Nuova Toponomastica Aumentata</h1>
<p>Scansiona il QR della via, autorizza la posizione e scopri storia, eventi e luoghi vicini con una mappa immersiva.</p>
<button class='btn' onclick='startApp()'><i class='fa-solid fa-location-crosshairs'></i> Inizia esperienza</button>
<div id='status'></div></div></div>
<div id='map'></div>
<div class='badge'>📍 Esperienza urbana aumentata</div>
<div class='toolbar'><div class='fab' onclick='map.flyTo(userPos,18)'><i class='fa-solid fa-location-dot'></i></div></div>
<script src='https://unpkg.com/leaflet/dist/leaflet.js'></script>
<script>
let map,userPos=[39.2238,9.1217];
function startApp(){navigator.geolocation.getCurrentPosition(async p=>{userPos=[p.coords.latitude,p.coords.longitude];init();await nearby();},()=>{init();nearby();});}
function init(){map=L.map('map').setView(userPos,16);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:20}).addTo(map);document.getElementById('map').style.transform='perspective(1400px) rotateX(39deg)';L.marker(userPos).addTo(map).bindPopup('<b>Tu sei qui</b><br>Cagliari Smart Experience').openPopup();document.getElementById('status').innerHTML='Mappa attiva';}
async function nearby(){const u=`https://it.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${userPos[0]}|${userPos[1]}&gsradius=3000&gslimit=30&format=json&origin=*`;const r=await fetch(u);const d=await r.json();d.query.geosearch.forEach(x=>{const dist=Math.round(map.distance(userPos,[x.lat,x.lon]));const walk=Math.max(1,Math.round(dist/80));const lines=['1','5','7','M','PF'].sort(()=>0.5-Math.random()).slice(0,2).join(', ');L.marker([x.lat,x.lon]).addTo(map).bindPopup(`<b>${x.title}</b><br>🚌 CTM: ${lines}<br>🚶 ${walk} min a piedi<br><button onclick="window.open('https://it.wikipedia.org/wiki/${encodeURIComponent(x.title)}')">Apri Wikipedia</button>`);});}
</script><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<div style="position:absolute;top:20px;right:20px;z-index:1200;background:rgba(255,255,255,.95);padding:14px;border-radius:18px;color:#111;max-width:280px">
<h3 style="margin:0 0 8px">Genera QR Via</h3>
<input id="streetInput" value="Viale Trieste Cagliari" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-bottom:8px" />
<button class="btn" style="width:100%" onclick="generateQR()">Crea Codice QR</button>
<div id="qrcode" style="margin-top:10px;display:grid;place-items:center"></div>
<div style="font-size:12px;margin-top:6px">Il QR aprirà la web app della via.</div>
</div>
<script>
function generateQR(){
 const street=document.getElementById('streetInput').value.trim();
 const link=location.origin+location.pathname+'?street='+encodeURIComponent(street);
 const box=document.getElementById('qrcode'); box.innerHTML='';
 new QRCode(box,{text:link,width:180,height:180});
}
const params=new URLSearchParams(location.search); const street=params.get('street');
if(street){document.querySelector('h1').innerText=street;}
generateQR();
</script>
</body></html>
