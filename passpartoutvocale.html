<!DOCTYPE html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Passpartout Vocale</title><style>body{margin:0;font-family:Arial,sans-serif;display:grid;place-items:center;min-height:100vh;background:linear-gradient(135deg,#0b1220,#123a63);color:#fff}.card{max-width:520px;background:rgba(255,255,255,.1);padding:28px;border-radius:24px;text-align:center;backdrop-filter:blur(10px)}button{padding:14px 18px;border:none;border-radius:12px;background:#fff;color:#123a63;font-weight:700;cursor:pointer}.big{font-size:34px;font-weight:800}.small{opacity:.9}</style></head><body><div class='card'><div class='big'>PASSPARTOUT</div><p>Dì una parola. Apri la città.</p><p class='small'>Parole magiche: Ciao · Bonjour · Hello</p><button onclick='startListen()'>🎤 Attiva ascolto</button><p id='status'></p></div><script>function go(){location.href='index.html';}function startListen(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){document.getElementById('status').innerText='Riconoscimento vocale non supportato';return;}const r=new SR();r.lang='it-IT';r.interimResults=false;r.maxAlternatives=3;document.getElementById('status').innerText='Ti ascolto...';r.onresult=function(e){const txt=e.results[0][0].transcript.toLowerCase();document.getElementById('status').innerText='Hai detto: '+txt;if(txt.includes('ciao')||txt.includes('bonjour')||txt.includes('hello')) go();else document.getElementById('status').innerText='Parola non riconosciuta';};r.onerror=function(){document.getElementById('status').innerText='Errore microfono';};r.start();}</script></body></html>
